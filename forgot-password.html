<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Forgot Password - OverNightStays</title>
</head>

<body>
    <nav>
        <div class="logo">
            <img src="Assets/images/logo.svg" width="200px" alt="Logo">
        </div>
        <button class="nav-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Browse stays</a></li>
            <li><a href="guide.html">Guide</a></li>
            <li><a href="about.html">About</a></li>
            <li id="list-btn"><a href="login.html">Owner Login</a></li>
        </ul>
    </nav>

    <section class="list-bnb-page">
        <div class="list-bnb-container auth-shell">

            <div class="list-bnb-header">
                <p class="list-bnb-tag">Owner Access</p>
                <h1>Forgot Password</h1>
                <p class="list-bnb-text">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
            </div>

            <form id="forgotForm" class="list-bnb-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>
                </div>

                <p id="forgotError" class="form-status form-status-error"></p>
                <p id="forgotSuccess" class="form-status form-status-success"></p>

                <button type="submit" class="submit-btn">Send Reset Link</button>

                <p class="auth-link">
                    Remember your password? <a href="login.html">Log in</a>
                </p>
            </form>
        </div>
    </section>

    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
