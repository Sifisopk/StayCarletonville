<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Add Listing - Stay Carletonville</title>
</head>

<body>
    <nav>
        <div class="logo">
            <img src="Assets/images/logo.svg" width="200px" alt="Logo">
        </div>
        <button class="nav-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Browse stays</a></li>
            <li><a href="dashboard.html">My Dashboard</a></li>
        </ul>
    </nav>

    <section class="list-bnb-page">
        <div class="list-bnb-container">
            <div class="list-bnb-header">
                <p class="list-bnb-tag">List Your Property</p>
                <h1>Add a New Listing</h1>
                <p class="list-bnb-text">
                    Fill in the details below. Your listing will appear once it's reviewed and approved.
                </p>
            </div>

            <form id="addListingForm" class="list-bnb-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">B&amp;B Name</label>
                        <input type="text" id="name" required placeholder="Enter business name">
                    </div>

                    <div class="form-group">
                        <label for="location">Location / Area</label>
                        <input type="text" id="location" required placeholder="e.g. Central Carletonville">
                    </div>

                    <div class="form-group">
                        <label for="price">Price Per Night (R)</label>
                        <input type="number" id="price" required min="0" placeholder="e.g. 450">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required placeholder="e.g. 0712345678">
                    </div>

                    <div class="form-group full-width">
                        <label for="maps">Google Maps Link</label>
                        <input type="url" id="maps" placeholder="Paste Google Maps URL">
                    </div>

                    <div class="form-group full-width">
                        <label for="mainImage">Main Image</label>
                        <input type="file" id="mainImage" accept="image/*" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="galleryImages">Gallery Images (optional, select multiple)</label>
                        <input type="file" id="galleryImages" accept="image/*" multiple>
                    </div>

                    <div class="form-group full-width">
                        <label>Amenities</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" value="wifi"> WiFi</label>
                            <label><input type="checkbox" value="breakfast"> Breakfast</label>
                            <label><input type="checkbox" value="parking"> Parking</label>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="description">Property Description</label>
                        <textarea id="description" rows="6" required
                            placeholder="Tell us about your property"></textarea>
                    </div>
                </div>

                <p id="addListingError" class="form-status form-status-error"></p>
                <p id="addListingStatus" class="form-status"></p>
                <button type="submit" class="submit-btn" id="submitBtn">Submit Listing</button>
            </form>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/nav-auth.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/add-listing.js"></script>
</body>

</html>
