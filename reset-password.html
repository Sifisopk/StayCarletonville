<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Reset Password - Stay Carletonville</title>
</head>

<body>
    <nav>
        <div class="logo">
            <img src="Assets/images/logo.svg" width="200px" alt="Logo">
        </div>
        <button class="nav-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Browse stays</a></li>
            <li><a href="guide.html">Guide</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <section class="list-bnb-page">
        <div class="list-bnb-container auth-shell">

            <div class="list-bnb-header">
                <p class="list-bnb-tag">Owner Access</p>
                <h1>Reset Password</h1>
            </div>

            <!-- Shown while waiting for the recovery event from Supabase -->
            <div id="resetWaiting" class="list-bnb-form" style="text-align:center; padding:2rem;">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size:2rem; color:#3758f9; margin-bottom:1rem;"></i>
                <p>Verifying your reset link...</p>
                <p style="font-size:0.85rem; color:#6b7280; margin-top:0.5rem;">
                    If nothing happens, your link may have expired.
                    <a href="forgot-password.html">Request a new one.</a>
                </p>
            </div>

            <!-- Shown after Supabase fires PASSWORD_RECOVERY event -->
            <div id="resetFormWrap" style="display:none;">
                <form id="resetForm" class="list-bnb-form">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" required
                                   minlength="6" placeholder="At least 6 characters">
                        </div>
                        <div class="form-group full-width">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" required
                                   minlength="6" placeholder="Repeat your new password">
                        </div>
                    </div>

                    <p id="resetError"   class="form-status form-status-error"></p>
                    <p id="resetSuccess" class="form-status form-status-success"></p>

                    <button type="submit" class="submit-btn">Update Password</button>
                </form>
            </div>

        </div>
    </section>

    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
