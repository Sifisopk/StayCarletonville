<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Owner Login - OverNightStays</title>
</head>

<body>
    <nav>
        <div class="logo">
            <img src="Assets/images/logo.svg" width="200px" alt="Logo">
        </div>
        <button class="nav-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Browse stays</a></li>
            <li><a href="guide.html">Guide</a></li>
            <li><a href="about.html">About</a></li>
            <li id="list-btn"><a href="list-bnb-page.html">List Your B&B</a></li>
        </ul>
    </nav>

    <section class="list-bnb-page">
        <div class="list-bnb-container auth-shell">
            <div class="list-bnb-header">
                <p class="list-bnb-tag">Owner Access</p>
                <h1>Log In</h1>
                <p class="list-bnb-text">Log in to manage your B&amp;B listings on Stay Carletonville.</p>
            </div>

            <form id="loginForm" class="list-bnb-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group full-width">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>
                </div>
                <p id="loginError" class="form-status form-status-error"></p>
                <button type="submit" class="submit-btn">Log In</button>
                <p class="auth-link">
                    <a href="forgot-password.html">Forgot your password?</a>
                </p>
                <p class="auth-link">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </p>
            </form>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/nav-auth.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
